name: Build Telegram APK
on:
  push:
    branches:
      - main # الروبوت هيشتغل تلقائي مع أي تعديل تعمله
  workflow_dispatch: # وزرار تشغيل يدوي كمان

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 سحب الريبو
        uses: actions/checkout@v4

      - name: ⚙️ إعداد بيئة Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 📦 تحميل المكتبات الجديدة
        run: flutter pub get

      - name: 🏗️ بناء تطبيق الأندرويد (APK)
        run: flutter build apk --release

      - name: 📤 رفع ملف الـ APK للتحميل
        uses: actions/upload-artifact@v4
        with:
          name: Telegram_Clone_APK
          path: build/app/outputs/flutter-apk/app-release.apk
