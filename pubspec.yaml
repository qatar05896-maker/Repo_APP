publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  uuid: ^4.3.3
  image_picker: ^1.0.7
  video_player: ^2.8.2
  intl: ^0.19.0
  # 👇 مكتبة الاتصال المباشر بالسيرفر
  web_socket_channel: ^2.4.4 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
